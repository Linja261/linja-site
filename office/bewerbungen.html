<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
    <meta name="theme-color" content="#7B6BA5">
    <title>Office · Bewerbungen – Linja</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            fontFamily: { sans: ['Fraunces','Georgia','serif'], serif: ['Fraunces','Georgia','serif'], mono: ['Geist Mono','ui-monospace','monospace'] },
            colors: { violet: { 50: '#f6f4f9', 100: '#ece8f2', 200: '#d9d1e5', 300: '#9a82b5', 400: '#7b6ba5', 500: '#6b5691' } },
        } } }
    </script>
    <style>.source-serif { font-family: "Fraunces", Georgia, serif; color: #472E56 !important; }</style>
</head>
<body style="background: #FAFAF8;" class="font-sans text-stone-700">

    <div id="office-gate"></div>

    <div id="office-content" style="display:none">
        <div id="office-nav"></div>

        <main class="max-w-[1100px] mx-auto px-6 pt-28 pb-20">

            <header class="mb-10">
                <p class="font-mono text-[0.65rem] tracking-wider uppercase mb-2 text-violet-400">Bewerbungen</p>
                <h1 class="source-serif text-3xl text-stone-900 mb-2">Pipeline</h1>
                <p class="text-sm text-stone-500">Endlicher Track. Läuft aus, sobald ControlExpert oder HERO unterschrieben sind.</p>
            </header>

            <!-- Quick-Add -->
            <section class="mb-10 bg-white border rounded-xl p-6" style="border-color: #E5E2DB;">
                <form id="add-form" class="grid grid-cols-1 md:grid-cols-[1fr_1fr_180px_140px_auto] gap-2">
                    <input type="text" id="add-company" placeholder="Firma" maxlength="80" required
                        class="px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                        style="border-color: #E5E2DB;">
                    <input type="text" id="add-role" placeholder="Rolle" maxlength="120" required
                        class="px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                        style="border-color: #E5E2DB;">
                    <select id="add-status"
                        class="px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                        style="border-color: #E5E2DB;">
                        <option value="entwurf">Entwurf</option>
                        <option value="versendet">Versendet</option>
                        <option value="gespraech">In Gespräch</option>
                        <option value="abgelaufen">Abgelaufen/Verworfen</option>
                    </select>
                    <input type="date" id="add-deadline"
                        class="px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                        style="border-color: #E5E2DB;">
                    <button type="submit" class="bg-violet-400 hover:bg-violet-500 text-white font-medium px-5 py-2.5 rounded-lg text-sm transition-all">+ Add</button>
                </form>
            </section>

            <!-- Lanes -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <section data-lane="entwurf">
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="source-serif text-base text-stone-900">Entwurf</h2>
                        <span id="cnt-entwurf" class="font-mono text-xs text-stone-400"></span>
                    </div>
                    <ul id="lane-entwurf" class="space-y-2"></ul>
                </section>
                <section data-lane="versendet">
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="source-serif text-base text-stone-900">Versendet</h2>
                        <span id="cnt-versendet" class="font-mono text-xs text-stone-400"></span>
                    </div>
                    <ul id="lane-versendet" class="space-y-2"></ul>
                </section>
                <section data-lane="gespraech">
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="source-serif text-base text-stone-900">In Gespräch</h2>
                        <span id="cnt-gespraech" class="font-mono text-xs text-stone-400"></span>
                    </div>
                    <ul id="lane-gespraech" class="space-y-2"></ul>
                </section>
                <section data-lane="abgelaufen">
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="source-serif text-base text-stone-900">Abgelaufen</h2>
                        <span id="cnt-abgelaufen" class="font-mono text-xs text-stone-400"></span>
                    </div>
                    <ul id="lane-abgelaufen" class="space-y-2"></ul>
                </section>
            </div>

        </main>
    </div>

    <script src="office.js?v=2" data-active="bewerbungen"></script>
    <script>
        var STATUSES = ['entwurf', 'versendet', 'gespraech', 'abgelaufen'];
        var STATUS_LABELS = { entwurf: 'Entwurf', versendet: 'Versendet', gespraech: 'In Gespräch', abgelaufen: 'Abgelaufen' };

        function escapeHtml(s) {
            return String(s || '').replace(/[&<>"']/g, function (m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
            });
        }

        function formatDate(dStr) {
            if (!dStr) return '';
            var d = new Date(dStr);
            return d.toLocaleDateString('de-DE', { day: '2-digit', month: 'short' });
        }

        function nextStatus(s) {
            var i = STATUSES.indexOf(s);
            return STATUSES[(i + 1) % STATUSES.length];
        }

        function renderAll() {
            var all = window.officeStore.get('applications', []);
            STATUSES.forEach(function (status) {
                var items = all.filter(function (a) { return a.status === status; });
                items.sort(function (a, b) { return (b.lastUpdate || '').localeCompare(a.lastUpdate || ''); });
                var listEl = document.getElementById('lane-' + status);
                document.getElementById('cnt-' + status).textContent = items.length === 0 ? '' : items.length;

                if (items.length === 0) {
                    listEl.innerHTML = '<li class="text-xs text-stone-400 italic px-3 py-4 text-center bg-white border rounded-lg" style="border-color: #E5E2DB;">—</li>';
                    return;
                }

                listEl.innerHTML = items.map(function (a) {
                    var deadline = a.deadline ? '<div class="font-mono text-xs text-stone-400 mt-2">Frist: ' + formatDate(a.deadline) + '</div>' : '';
                    return '<li class="bg-white border rounded-lg px-4 py-3 group" style="border-color: #E5E2DB;">'
                        + '<div class="flex items-start justify-between gap-2 mb-1">'
                        + '<div class="font-medium text-sm text-stone-900">' + escapeHtml(a.company) + '</div>'
                        + '<button onclick="deleteApp(\'' + a.id + '\')" class="opacity-0 group-hover:opacity-100 text-stone-300 hover:text-red-400 transition-all text-xs">✕</button>'
                        + '</div>'
                        + '<div class="text-xs text-stone-500">' + escapeHtml(a.role) + '</div>'
                        + deadline
                        + '<button onclick="advanceApp(\'' + a.id + '\')" class="mt-3 w-full text-[0.7rem] font-mono tracking-wide uppercase text-stone-400 hover:text-violet-500 border-t pt-2 transition-all" style="border-color: #E5E2DB;">→ ' + STATUS_LABELS[nextStatus(a.status)] + '</button>'
                        + '</li>';
                }).join('');
            });
        }

        window.advanceApp = function (id) {
            var all = window.officeStore.get('applications', []);
            var a = all.find(function (x) { return x.id === id; });
            if (!a) return;
            a.status = nextStatus(a.status);
            a.lastUpdate = new Date().toISOString();
            window.officeStore.set('applications', all);
            renderAll();
        };

        window.deleteApp = function (id) {
            var all = window.officeStore.get('applications', []);
            all = all.filter(function (x) { return x.id !== id; });
            window.officeStore.set('applications', all);
            renderAll();
        };

        document.addEventListener('DOMContentLoaded', function () {
            if (!window.officeStore) return;

            document.getElementById('add-form').addEventListener('submit', function (ev) {
                ev.preventDefault();
                var company = document.getElementById('add-company').value.trim();
                var role = document.getElementById('add-role').value.trim();
                var status = document.getElementById('add-status').value;
                var deadline = document.getElementById('add-deadline').value;
                if (!company || !role) return;

                var all = window.officeStore.get('applications', []);
                all.push({
                    id: 'a' + Date.now() + Math.random().toString(36).slice(2, 6),
                    company: company,
                    role: role,
                    status: status,
                    deadline: deadline || null,
                    lastUpdate: new Date().toISOString(),
                    notes: '',
                });
                window.officeStore.set('applications', all);

                document.getElementById('add-company').value = '';
                document.getElementById('add-role').value = '';
                document.getElementById('add-deadline').value = '';
                renderAll();
            });

            renderAll();
        });
    </script>
</body>
</html>

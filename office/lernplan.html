<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
    <meta name="theme-color" content="#7B6BA5">
    <title>Office · Lernplan – Linja</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            fontFamily: { sans: ['Inter','system-ui','sans-serif'], serif: ['Source Serif 4','Georgia','serif'], mono: ['Geist Mono','ui-monospace','monospace'] },
            colors: { violet: { 50: '#f6f4f9', 100: '#ece8f2', 200: '#d9d1e5', 300: '#9a82b5', 400: '#7b6ba5', 500: '#6b5691' } },
        } } }
    </script>
    <style>.source-serif { font-family: "Source Serif 4", Georgia, serif; }</style>
</head>
<body style="background: #FAFAF8;" class="font-sans text-stone-700">

    <div id="office-gate"></div>

    <div id="office-content" style="display:none">
        <div id="office-nav"></div>

        <main class="max-w-[1100px] mx-auto px-6 pt-28 pb-20">

            <header class="mb-10">
                <p class="font-mono text-[0.65rem] tracking-wider uppercase mb-2 text-violet-400">Lernplan</p>
                <h1 class="source-serif text-3xl text-stone-900 mb-2">Now · Next · Later</h1>
                <p class="text-sm text-stone-500">Mittelfristige Lernpfade (Quartal+). Wochenziele leben unter <a href="ziele.html" class="text-violet-400 hover:text-violet-500">Ziele</a>.</p>
            </header>

            <!-- Quick-Add -->
            <section class="mb-10 bg-white border rounded-xl p-6" style="border-color: #E5E2DB;">
                <form id="add-form" class="grid grid-cols-1 md:grid-cols-[1fr_1fr_140px_1fr_auto] gap-2">
                    <input type="text" id="add-skill" placeholder="Lernfeld / Skill" maxlength="80" required
                        class="px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                        style="border-color: #E5E2DB;">
                    <input type="text" id="add-target" placeholder="Zielzustand kurz" maxlength="160"
                        class="px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                        style="border-color: #E5E2DB;">
                    <select id="add-lane"
                        class="px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                        style="border-color: #E5E2DB;">
                        <option value="now">Now</option>
                        <option value="next">Next</option>
                        <option value="later">Later</option>
                    </select>
                    <input type="text" id="add-vault" placeholder="Vault-Pfad (optional)" maxlength="200"
                        class="px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                        style="border-color: #E5E2DB;">
                    <button type="submit" class="bg-violet-400 hover:bg-violet-500 text-white font-medium px-5 py-2.5 rounded-lg text-sm transition-all">+ Add</button>
                </form>
            </section>

            <!-- Lanes -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <section data-lane="now">
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="source-serif text-base text-stone-900">Now</h2>
                        <span id="cnt-now" class="font-mono text-xs text-stone-400"></span>
                    </div>
                    <ul id="lane-now" class="space-y-2"></ul>
                </section>
                <section data-lane="next">
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="source-serif text-base text-stone-900">Next</h2>
                        <span id="cnt-next" class="font-mono text-xs text-stone-400"></span>
                    </div>
                    <ul id="lane-next" class="space-y-2"></ul>
                </section>
                <section data-lane="later">
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="source-serif text-base text-stone-900">Later</h2>
                        <span id="cnt-later" class="font-mono text-xs text-stone-400"></span>
                    </div>
                    <ul id="lane-later" class="space-y-2"></ul>
                </section>
            </div>

        </main>
    </div>

    <script src="office.js" data-active="lernplan"></script>
    <script>
        var LANES = ['now', 'next', 'later'];
        var LANE_LABELS = { now: 'Now', next: 'Next', later: 'Later' };

        function escapeHtml(s) {
            return String(s || '').replace(/[&<>"']/g, function (m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
            });
        }

        function nextLane(l) {
            var i = LANES.indexOf(l);
            return LANES[(i + 1) % LANES.length];
        }

        function prevLane(l) {
            var i = LANES.indexOf(l);
            return LANES[(i - 1 + LANES.length) % LANES.length];
        }

        function renderAll() {
            var all = window.officeStore.get('learningplan', []);
            LANES.forEach(function (lane) {
                var items = all.filter(function (a) { return a.lane === lane; });
                items.sort(function (a, b) { return (a.addedAt || '').localeCompare(b.addedAt || ''); });
                var listEl = document.getElementById('lane-' + lane);
                document.getElementById('cnt-' + lane).textContent = items.length === 0 ? '' : items.length;

                if (items.length === 0) {
                    listEl.innerHTML = '<li class="text-xs text-stone-400 italic px-3 py-4 text-center bg-white border rounded-lg" style="border-color: #E5E2DB;">—</li>';
                    return;
                }

                listEl.innerHTML = items.map(function (a) {
                    var target = a.targetState ? '<div class="text-xs text-stone-500 mt-1">' + escapeHtml(a.targetState) + '</div>' : '';
                    var vault = a.vaultPath ? '<div class="font-mono text-[0.65rem] text-stone-400 mt-2 break-all">' + escapeHtml(a.vaultPath) + '</div>' : '';
                    var canBack = lane !== 'now';
                    var canForward = lane !== 'later';
                    var backBtn = canBack ? '<button onclick="moveLane(\'' + a.id + '\',\'' + prevLane(lane) + '\')" class="text-[0.7rem] font-mono tracking-wide uppercase text-stone-400 hover:text-violet-500 transition-all">← ' + LANE_LABELS[prevLane(lane)] + '</button>' : '<span></span>';
                    var fwdBtn = canForward ? '<button onclick="moveLane(\'' + a.id + '\',\'' + nextLane(lane) + '\')" class="text-[0.7rem] font-mono tracking-wide uppercase text-stone-400 hover:text-violet-500 transition-all">' + LANE_LABELS[nextLane(lane)] + ' →</button>' : '<span></span>';
                    return '<li class="bg-white border rounded-lg px-4 py-3 group" style="border-color: #E5E2DB;">'
                        + '<div class="flex items-start justify-between gap-2 mb-1">'
                        + '<div class="font-medium text-sm text-stone-900">' + escapeHtml(a.skill) + '</div>'
                        + '<button onclick="deleteItem(\'' + a.id + '\')" class="opacity-0 group-hover:opacity-100 text-stone-300 hover:text-red-400 transition-all text-xs">✕</button>'
                        + '</div>'
                        + target
                        + vault
                        + '<div class="flex items-center justify-between mt-3 pt-2 border-t" style="border-color: #E5E2DB;">'
                        + backBtn + fwdBtn
                        + '</div>'
                        + '</li>';
                }).join('');
            });
        }

        window.moveLane = function (id, newLane) {
            var all = window.officeStore.get('learningplan', []);
            var a = all.find(function (x) { return x.id === id; });
            if (!a) return;
            a.lane = newLane;
            window.officeStore.set('learningplan', all);
            renderAll();
        };

        window.deleteItem = function (id) {
            var all = window.officeStore.get('learningplan', []);
            all = all.filter(function (x) { return x.id !== id; });
            window.officeStore.set('learningplan', all);
            renderAll();
        };

        document.addEventListener('DOMContentLoaded', function () {
            if (!window.officeStore) return;

            document.getElementById('add-form').addEventListener('submit', function (ev) {
                ev.preventDefault();
                var skill = document.getElementById('add-skill').value.trim();
                var target = document.getElementById('add-target').value.trim();
                var lane = document.getElementById('add-lane').value;
                var vault = document.getElementById('add-vault').value.trim();
                if (!skill) return;

                var all = window.officeStore.get('learningplan', []);
                all.push({
                    id: 'l' + Date.now() + Math.random().toString(36).slice(2, 6),
                    skill: skill,
                    targetState: target,
                    lane: lane,
                    vaultPath: vault,
                    addedAt: new Date().toISOString(),
                });
                window.officeStore.set('learningplan', all);

                document.getElementById('add-skill').value = '';
                document.getElementById('add-target').value = '';
                document.getElementById('add-vault').value = '';
                renderAll();
            });

            renderAll();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
    <meta name="theme-color" content="#7B6BA5">
    <title>Office · Reminder – Linja</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            fontFamily: { sans: ['Inter','system-ui','sans-serif'], serif: ['Source Serif 4','Georgia','serif'], mono: ['Geist Mono','ui-monospace','monospace'] },
            colors: { violet: { 50: '#f6f4f9', 100: '#ece8f2', 200: '#d9d1e5', 300: '#9a82b5', 400: '#7b6ba5', 500: '#6b5691' } },
        } } }
    </script>
    <style>.source-serif { font-family: "Source Serif 4", Georgia, serif; }</style>
</head>
<body style="background: #FAFAF8;" class="font-sans text-stone-700">

    <div id="office-gate"></div>

    <div id="office-content" style="display:none">
        <div id="office-nav"></div>

        <main class="max-w-[900px] mx-auto px-6 pt-28 pb-20">

            <header class="mb-10">
                <p class="font-mono text-[0.65rem] tracking-wider uppercase mb-2 text-violet-400">Reminder</p>
                <h1 class="source-serif text-3xl text-stone-900 mb-2">Inbox</h1>
                <p class="text-sm text-stone-500">Datierte Reminder zentral. Manuell pflegen — aktuell keine Auto-Sync mit Memory.</p>
            </header>

            <!-- Quick-Add -->
            <section class="mb-10 bg-white border rounded-xl p-6" style="border-color: #E5E2DB;">
                <form id="add-form" class="grid grid-cols-1 md:grid-cols-[1fr_140px_140px_auto] gap-2">
                    <input type="text" id="add-title" placeholder="Worum geht's?" maxlength="120" required
                        class="px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                        style="border-color: #E5E2DB;">
                    <input type="date" id="add-date" required
                        class="px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                        style="border-color: #E5E2DB;">
                    <input type="text" id="add-source" placeholder="Quelle (optional)" maxlength="80"
                        class="px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                        style="border-color: #E5E2DB;">
                    <button type="submit" class="bg-violet-400 hover:bg-violet-500 text-white font-medium px-5 py-2.5 rounded-lg text-sm transition-all">+ Reminder</button>
                </form>
            </section>

            <!-- Sektionen -->
            <section class="mb-8">
                <h2 class="source-serif text-lg text-stone-900 mb-3">Heute <span id="cnt-today" class="font-mono text-xs text-stone-400 ml-2"></span></h2>
                <ul id="list-today" class="space-y-2"></ul>
            </section>

            <section class="mb-8">
                <h2 class="source-serif text-lg text-stone-900 mb-3">Diese Woche <span id="cnt-week" class="font-mono text-xs text-stone-400 ml-2"></span></h2>
                <ul id="list-week" class="space-y-2"></ul>
            </section>

            <section class="mb-8">
                <h2 class="source-serif text-lg text-stone-900 mb-3">Später <span id="cnt-later" class="font-mono text-xs text-stone-400 ml-2"></span></h2>
                <ul id="list-later" class="space-y-2"></ul>
            </section>

            <section class="mb-8">
                <details>
                    <summary class="cursor-pointer source-serif text-lg text-stone-700 mb-3">Erledigt <span id="cnt-done" class="font-mono text-xs text-stone-400 ml-2"></span></summary>
                    <ul id="list-done" class="space-y-2 mt-3"></ul>
                </details>
            </section>

            <!-- Export -->
            <section class="mt-12">
                <div class="bg-white border rounded-xl p-6" style="border-color: #E5E2DB;">
                    <h3 class="source-serif text-base text-stone-900 mb-2">Daten</h3>
                    <p class="text-sm text-stone-500 mb-4">Lokal im Browser. Export als JSON für Backup.</p>
                    <div class="flex gap-2">
                        <button onclick="exportReminders()" class="border hover:border-violet-300 text-stone-700 font-medium px-5 py-2.5 rounded-lg text-sm transition-all" style="border-color: #E5E2DB;">JSON exportieren</button>
                        <label class="border hover:border-violet-300 text-stone-700 font-medium px-5 py-2.5 rounded-lg text-sm transition-all cursor-pointer" style="border-color: #E5E2DB;">
                            JSON importieren
                            <input type="file" accept=".json" class="hidden" onchange="importReminders(event)">
                        </label>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="office.js" data-active="reminder"></script>
    <script>
        function escapeHtml(s) {
            return String(s || '').replace(/[&<>"']/g, function (m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
            });
        }

        function classifyBucket(dueDate, today, weekEnd) {
            if (dueDate <= today) return 'today';
            if (dueDate <= weekEnd) return 'week';
            return 'later';
        }

        function endOfWeek() {
            var d = new Date();
            d.setHours(0, 0, 0, 0);
            var dayNr = (d.getDay() + 6) % 7;
            d.setDate(d.getDate() + (6 - dayNr));
            return d.toISOString().slice(0, 10);
        }

        function formatDate(dStr) {
            var d = new Date(dStr);
            return d.toLocaleDateString('de-DE', { day: '2-digit', month: 'short' });
        }

        function renderAll() {
            var all = window.officeStore.get('reminders', []);
            var today = window.officeUtils.today();
            var weekEnd = endOfWeek();

            var buckets = { today: [], week: [], later: [], done: [] };
            all.forEach(function (r) {
                if (r.done) {
                    buckets.done.push(r);
                } else {
                    buckets[classifyBucket(r.dueDate, today, weekEnd)].push(r);
                }
            });

            ['today', 'week', 'later'].forEach(function (b) {
                buckets[b].sort(function (a, x) { return a.dueDate.localeCompare(x.dueDate); });
            });
            buckets.done.sort(function (a, x) { return (x.completedAt || '').localeCompare(a.completedAt || ''); });

            renderBucket('today', buckets.today);
            renderBucket('week', buckets.week);
            renderBucket('later', buckets.later);
            renderBucket('done', buckets.done);
        }

        function renderBucket(name, items) {
            var listEl = document.getElementById('list-' + name);
            var cntEl = document.getElementById('cnt-' + name);
            cntEl.textContent = items.length === 0 ? '' : '(' + items.length + ')';

            if (items.length === 0) {
                listEl.innerHTML = '<li class="text-sm text-stone-400 italic">—</li>';
                return;
            }

            listEl.innerHTML = items.map(function (r) {
                var overdue = !r.done && r.dueDate < window.officeUtils.today();
                var dateColor = overdue ? 'text-red-400' : 'text-stone-400';
                var titleColor = r.done ? 'text-stone-400 line-through' : 'text-stone-800';
                var checkCls = r.done ? 'bg-violet-400 border-violet-400' : 'bg-white border-stone-300';
                var check = r.done ? '<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>' : '';
                var source = r.source ? '<span class="text-xs text-stone-400 ml-2">· ' + escapeHtml(r.source) + '</span>' : '';
                return '<li class="flex items-center gap-3 group bg-white border rounded-lg px-4 py-3" style="border-color: #E5E2DB;">'
                    + '<button onclick="toggleReminder(\'' + r.id + '\')" class="w-5 h-5 rounded border flex items-center justify-center transition-all flex-shrink-0 ' + checkCls + '">' + check + '</button>'
                    + '<span class="flex-1 text-sm ' + titleColor + '">' + escapeHtml(r.title) + source + '</span>'
                    + '<span class="font-mono text-xs ' + dateColor + '">' + formatDate(r.dueDate) + '</span>'
                    + '<button onclick="deleteReminder(\'' + r.id + '\')" class="opacity-0 group-hover:opacity-100 text-stone-300 hover:text-red-400 transition-all text-xs">✕</button>'
                    + '</li>';
            }).join('');
        }

        window.toggleReminder = function (id) {
            var all = window.officeStore.get('reminders', []);
            var r = all.find(function (x) { return x.id === id; });
            if (!r) return;
            r.done = !r.done;
            r.completedAt = r.done ? new Date().toISOString() : null;
            window.officeStore.set('reminders', all);
            renderAll();
        };

        window.deleteReminder = function (id) {
            var all = window.officeStore.get('reminders', []);
            all = all.filter(function (x) { return x.id !== id; });
            window.officeStore.set('reminders', all);
            renderAll();
        };

        window.exportReminders = function () {
            var data = window.officeStore.get('reminders', []);
            window.officeUtils.downloadJSON('reminders-' + window.officeUtils.today() + '.json', data);
        };

        window.importReminders = function (ev) {
            var file = ev.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function (e) {
                try {
                    var data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        window.officeStore.set('reminders', data);
                        renderAll();
                    }
                } catch (err) {
                    alert('Import fehlgeschlagen: ' + err.message);
                }
            };
            reader.readAsText(file);
        };

        document.addEventListener('DOMContentLoaded', function () {
            if (!window.officeStore) return;

            document.getElementById('add-date').value = window.officeUtils.today();

            document.getElementById('add-form').addEventListener('submit', function (ev) {
                ev.preventDefault();
                var title = document.getElementById('add-title').value.trim();
                var dueDate = document.getElementById('add-date').value;
                var source = document.getElementById('add-source').value.trim();
                if (!title || !dueDate) return;

                var all = window.officeStore.get('reminders', []);
                all.push({
                    id: 'r' + Date.now() + Math.random().toString(36).slice(2, 6),
                    title: title,
                    dueDate: dueDate,
                    source: source,
                    done: false,
                    createdAt: new Date().toISOString(),
                });
                window.officeStore.set('reminders', all);

                document.getElementById('add-title').value = '';
                document.getElementById('add-source').value = '';
                document.getElementById('add-date').value = window.officeUtils.today();
                renderAll();
            });

            renderAll();
        });
    </script>
</body>
</html>

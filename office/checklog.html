<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
    <meta name="theme-color" content="#7B6BA5">
    <title>Office · Check-Log – Linja</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            fontFamily: { sans: ['Inter','system-ui','sans-serif'], serif: ['Source Serif 4','Georgia','serif'], mono: ['Geist Mono','ui-monospace','monospace'] },
            colors: { violet: { 50: '#f6f4f9', 100: '#ece8f2', 200: '#d9d1e5', 300: '#9a82b5', 400: '#7b6ba5', 500: '#6b5691' } },
        } } }
    </script>
    <style>.source-serif { font-family: "Source Serif 4", Georgia, serif; }</style>
</head>
<body style="background: #FAFAF8;" class="font-sans text-stone-700">

    <div id="office-gate"></div>

    <div id="office-content" style="display:none">
        <div id="office-nav"></div>

        <main class="max-w-[900px] mx-auto px-6 pt-28 pb-20">

            <header class="mb-10">
                <p class="font-mono text-[0.65rem] tracking-wider uppercase mb-2 text-violet-400">Check-Log</p>
                <h1 class="source-serif text-3xl text-stone-900 mb-2">Stimmung & Fokus</h1>
                <p class="text-sm text-stone-500">Manuelle Timeline aus /checkin und /checkout. Zeigt was offen blieb.</p>
            </header>

            <!-- Quick-Add -->
            <section class="mb-10 bg-white border rounded-xl p-6" style="border-color: #E5E2DB;">
                <form id="add-form" class="space-y-3">
                    <div class="grid grid-cols-1 md:grid-cols-[140px_140px_1fr] gap-2">
                        <input type="date" id="add-date" required
                            class="px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                            style="border-color: #E5E2DB;">
                        <select id="add-type"
                            class="px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                            style="border-color: #E5E2DB;">
                            <option value="checkin">Check-in</option>
                            <option value="checkout">Check-out</option>
                        </select>
                        <select id="add-mood"
                            class="px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                            style="border-color: #E5E2DB;">
                            <option value="">Mood (optional) …</option>
                            <option value="😄">😄 stark</option>
                            <option value="🙂">🙂 ok</option>
                            <option value="😐">😐 neutral</option>
                            <option value="😕">😕 fragil</option>
                            <option value="😩">😩 leer</option>
                        </select>
                    </div>
                    <input type="text" id="add-focus" placeholder="Fokus heute (kurz)" maxlength="200"
                        class="w-full px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                        style="border-color: #E5E2DB;">
                    <textarea id="add-open" placeholder="Offene Punkte (eine pro Zeile)" rows="3"
                        class="w-full px-4 py-2.5 rounded-lg border text-sm bg-white focus:outline-none focus:border-violet-300"
                        style="border-color: #E5E2DB;"></textarea>
                    <button type="submit" class="bg-violet-400 hover:bg-violet-500 text-white font-medium px-5 py-2.5 rounded-lg text-sm transition-all">+ Eintrag</button>
                </form>
            </section>

            <!-- Timeline -->
            <section class="mb-8">
                <h2 class="source-serif text-lg text-stone-900 mb-4">Letzte 14 Tage</h2>
                <ul id="timeline" class="space-y-3"></ul>
            </section>

            <section class="mb-8">
                <details>
                    <summary class="cursor-pointer source-serif text-lg text-stone-700 mb-3">Älter <span id="cnt-older" class="font-mono text-xs text-stone-400 ml-2"></span></summary>
                    <ul id="older" class="space-y-3 mt-3"></ul>
                </details>
            </section>

        </main>
    </div>

    <script src="office.js" data-active="checklog"></script>
    <script>
        function escapeHtml(s) {
            return String(s || '').replace(/[&<>"']/g, function (m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
            });
        }

        function formatDate(dStr) {
            var d = new Date(dStr);
            return d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: 'short' });
        }

        function daysAgo(dStr) {
            var d = new Date(dStr);
            var now = new Date();
            return Math.floor((now - d) / 86400000);
        }

        function renderEntry(e) {
            var typeBadge = e.type === 'checkin'
                ? '<span class="font-mono text-[0.6rem] tracking-wider uppercase px-2 py-0.5 rounded text-violet-500" style="background: #ece8f2;">CHECK-IN</span>'
                : '<span class="font-mono text-[0.6rem] tracking-wider uppercase px-2 py-0.5 rounded" style="background: #fae8de; color: #a86340;">CHECK-OUT</span>';
            var mood = e.mood ? '<span class="text-base ml-2">' + e.mood + '</span>' : '';
            var focus = e.focus ? '<div class="text-sm text-stone-700 mt-2">' + escapeHtml(e.focus) + '</div>' : '';
            var openItems = (e.openPoints || []).filter(function (x) { return x.trim(); });
            var open = openItems.length === 0 ? '' : '<ul class="text-xs text-stone-500 mt-2 space-y-1">' + openItems.map(function (p) {
                return '<li>· ' + escapeHtml(p) + '</li>';
            }).join('') + '</ul>';
            return '<li class="bg-white border rounded-xl p-5 group" style="border-color: #E5E2DB;">'
                + '<div class="flex items-center justify-between mb-1">'
                + '<div class="flex items-center gap-2">'
                + typeBadge
                + '<span class="font-mono text-xs text-stone-400">' + formatDate(e.date) + '</span>'
                + mood
                + '</div>'
                + '<button onclick="deleteEntry(\'' + e.id + '\')" class="opacity-0 group-hover:opacity-100 text-stone-300 hover:text-red-400 transition-all text-xs">✕</button>'
                + '</div>'
                + focus
                + open
                + '</li>';
        }

        function renderAll() {
            var all = window.officeStore.get('checklog', []);
            all.sort(function (a, b) {
                var d = b.date.localeCompare(a.date);
                if (d !== 0) return d;
                return (b.createdAt || '').localeCompare(a.createdAt || '');
            });

            var recent = [], older = [];
            all.forEach(function (e) {
                if (daysAgo(e.date) <= 14) recent.push(e);
                else older.push(e);
            });

            var timelineEl = document.getElementById('timeline');
            if (recent.length === 0) {
                timelineEl.innerHTML = '<li class="text-sm text-stone-400 italic">Noch keine Einträge.</li>';
            } else {
                timelineEl.innerHTML = recent.map(renderEntry).join('');
            }

            var olderEl = document.getElementById('older');
            document.getElementById('cnt-older').textContent = older.length === 0 ? '' : '(' + older.length + ')';
            olderEl.innerHTML = older.length === 0 ? '<li class="text-sm text-stone-400 italic">—</li>' : older.map(renderEntry).join('');
        }

        window.deleteEntry = function (id) {
            var all = window.officeStore.get('checklog', []);
            all = all.filter(function (x) { return x.id !== id; });
            window.officeStore.set('checklog', all);
            renderAll();
        };

        document.addEventListener('DOMContentLoaded', function () {
            if (!window.officeStore) return;

            document.getElementById('add-date').value = window.officeUtils.today();

            document.getElementById('add-form').addEventListener('submit', function (ev) {
                ev.preventDefault();
                var date = document.getElementById('add-date').value;
                var type = document.getElementById('add-type').value;
                var mood = document.getElementById('add-mood').value;
                var focus = document.getElementById('add-focus').value.trim();
                var openText = document.getElementById('add-open').value;
                var openPoints = openText.split('\n').map(function (s) { return s.trim(); }).filter(Boolean);
                if (!date) return;

                var all = window.officeStore.get('checklog', []);
                all.push({
                    id: 'c' + Date.now() + Math.random().toString(36).slice(2, 6),
                    date: date,
                    type: type,
                    mood: mood,
                    focus: focus,
                    openPoints: openPoints,
                    createdAt: new Date().toISOString(),
                });
                window.officeStore.set('checklog', all);

                document.getElementById('add-mood').value = '';
                document.getElementById('add-focus').value = '';
                document.getElementById('add-open').value = '';
                renderAll();
            });

            renderAll();
        });
    </script>
</body>
</html>
